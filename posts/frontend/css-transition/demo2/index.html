<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS 变量与过渡动效 - Vue 版本</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="/demo-theme.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-color: #0d0d0d;
        --card-border: rgba(255, 255, 255, 0.12);
        --card-border-hover: rgba(255, 255, 255, 0.4);
        --card-bg-hover: rgba(255, 255, 255, 0.04);
        --dot-inactive: #333;
        --dot-active: #e8e8e8;
        --text-color: rgba(255, 255, 255, 0.3);
        --text-hover: rgba(255, 255, 255, 0.7);
      }

      :root[data-theme='light'] {
        --bg-color: #f5f5f5;
        --card-border: rgba(0, 0, 0, 0.12);
        --card-border-hover: rgba(0, 0, 0, 0.4);
        --card-bg-hover: rgba(0, 0, 0, 0.04);
        --dot-inactive: #ccc;
        --dot-active: #333;
        --text-color: rgba(0, 0, 0, 0.4);
        --text-hover: rgba(0, 0, 0, 0.8);
      }

      body {
        background: var(--bg-color);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: monospace;
        transition: background 0.3s;
      }

      .container {
        display: flex;
        gap: 1.5rem;
      }

      .card {
        width: 120px;
        height: 140px;
        border: 1px solid var(--card-border);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        cursor: pointer;
        transition:
          border-color 0.3s,
          background 0.3s;
      }

      .card:hover {
        border-color: var(--card-border-hover);
        background: var(--card-bg-hover);
      }

      .dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        transition:
          background 0.4s,
          transform 0.4s;
      }

      .card:hover .dot {
        transform: scale(1.2);
      }

      p {
        color: var(--text-color);
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        transition: color 0.3s;
      }

      .card:hover p {
        color: var(--text-hover);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="container">
        <div
          v-for="(color, i) in colors"
          :key="i"
          class="card"
          @mouseenter="activeIndex = i"
          @mouseleave="activeIndex = null"
        >
          <div class="dot" :style="{ background: dotColors[i] }"></div>
          <p>hover me</p>
        </div>
      </div>
    </div>
    <script>
      const { createApp, ref, computed } = Vue

      createApp({
        setup() {
          const colors = ['#e8c88a', '#8ab4e8', '#a8e89a', '#e89ab4', '#c8a8e8']
          const activeIndex = ref(null)

          // CSS variables handle the theme colors
          const dotColors = computed(() => {
            return colors.map((color, i) => (activeIndex.value === i ? color : 'var(--dot-inactive)'))
          })

          return { colors, activeIndex, dotColors }
        },
      }).mount('#app')
    </script>
  </body>
</html>
