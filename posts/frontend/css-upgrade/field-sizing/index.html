<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>field-sizing: 输入框自适应内容</title>
    <link rel="stylesheet" href="/demo-base.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="demo-section">
        <h3>传统固定尺寸</h3>
        <input
          type="text"
          class="fixed-input"
          placeholder="输入内容看看..."
          value="这是一段比较长的文本内容，会被截断"
        />
        <textarea class="fixed-textarea" rows="3" placeholder="输入多行内容...">
这是一个传统的 textarea，高度固定为3行。当你输入更多内容时，会出现滚动条而不是自动扩展高度。</textarea
        >
      </div>

      <div class="demo-section">
        <h3>field-sizing: content 自适应</h3>
        <input type="text" class="auto-input" placeholder="输入内容，宽度会自适应..." />
        <textarea class="auto-textarea" placeholder="输入多行内容，高度会自动扩展..."></textarea>
      </div>

      <div class="hint">
        <span class="dot"></span>
        在自适应输入框中输入内容，观察尺寸变化
      </div>
    </div>
    <script src="./script.js"></script>
    <script src="/demo-theme.js"></script>
  </body>
</html>
