<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scrollsnapchanging: 滚动捕捉事件</title>
    <link rel="stylesheet" href="/demo-base.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="info-panel">
        <div class="info-item">
          <span class="label">当前聚焦</span>
          <span class="value" id="current-item">-</span>
        </div>
        <div class="info-item">
          <span class="label">滚动状态</span>
          <span class="value" id="scroll-state">空闲</span>
        </div>
      </div>

      <div class="scroller-wrapper">
        <div class="scroller" id="scroller">
          <div class="snap-item" data-index="1">
            <span class="number">01</span>
            <span class="title">第一章</span>
          </div>
          <div class="snap-item" data-index="2">
            <span class="number">02</span>
            <span class="title">第二章</span>
          </div>
          <div class="snap-item" data-index="3">
            <span class="number">03</span>
            <span class="title">第三章</span>
          </div>
          <div class="snap-item" data-index="4">
            <span class="number">04</span>
            <span class="title">第四章</span>
          </div>
          <div class="snap-item" data-index="5">
            <span class="number">05</span>
            <span class="title">第五章</span>
          </div>
        </div>
      </div>

      <div class="hint">
        <p>← 左右滑动或拖拽查看 →</p>
        <p class="sub">监听 scrollsnapchanging 和 scrollsnapchange 事件</p>
      </div>
    </div>

    <script src="./script.js"></script>
    <script src="/demo-theme.js"></script>
  </body>
</html>
