<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@starting-style: 元素初始样式</title>
    <link rel="stylesheet" href="/demo-base.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="demo-section">
        <h3>点击添加新元素</h3>
        <div class="button-group">
          <button class="add-btn" data-type="fade">淡入</button>
          <button class="add-btn" data-type="slide">滑入</button>
          <button class="add-btn" data-type="scale">缩放</button>
          <button class="add-btn" data-type="rotate">旋转</button>
        </div>
        <button class="clear-btn">清空所有</button>
      </div>

      <div class="demo-section">
        <h3>动态元素列表</h3>
        <div class="item-list" id="item-list">
          <!-- 新元素会添加到这里 -->
        </div>
      </div>

      <div class="code-hint">
        <p>@starting-style 让新添加的元素可以有初始动画状态</p>
      </div>
    </div>

    <script src="./script.js"></script>
    <script src="/demo-theme.js"></script>
  </body>
</html>
