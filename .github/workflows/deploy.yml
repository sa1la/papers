name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check Umami files changed
        id: changed-files
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1 && git diff --name-only HEAD^ HEAD | grep -q '^docker/umami/'; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SERVER_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" > ~/.ssh/known_hosts

      - name: Deploy blog to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          PORT="${SERVER_PORT:-22}"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -p $PORT" \
            .vitepress/dist/ \
            "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"
          echo "Deployed to $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH"

      - name: Deploy Umami
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          UMAMI_PATH: ${{ secrets.UMAMI_PATH }}
        run: |
          set -euo pipefail
          PORT="${SERVER_PORT:-22}"
          UMAMI_DIR="${UMAMI_PATH:-/opt/umami}"

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -P "$PORT" \
            docker/umami/docker-compose.yml \
            "$SERVER_USER@$SERVER_HOST:$UMAMI_DIR/docker-compose.yml"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -p "$PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "cd \"$UMAMI_DIR\" && \
             if [ -f data/umami.db ]; then cp data/umami.db data/umami.db.backup.\$(date +%Y%m%d_%H%M%S); fi && \
             docker compose pull && \
             docker compose up -d --remove-orphans"

          echo "Umami deployed to $SERVER_USER@$SERVER_HOST:$UMAMI_DIR"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts
