name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SERVER_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" > ~/.ssh/known_hosts
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "Error: ssh-keyscan failed to retrieve host key for $SERVER_HOST:$PORT"
            exit 1
          fi
          echo "SSH_OPTS=-i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" >> "$GITHUB_ENV"

      - name: Deploy blog to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          PORT="${SERVER_PORT:-22}"
          rsync -avz --delete \
            -e "ssh $SSH_OPTS -p $PORT" \
            .vitepress/dist/ \
            "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"
          echo "Deployed to $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts
